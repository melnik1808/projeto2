<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Aventura Misteriosa</h1>

    <img id="imagem"
    src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=900"
    alt="Floresta">

    <p id="texto">
        Você encontrou um antigo mapa perdido. Ele aponta para uma floresta cheia de mistérios.
        Para onde deseja seguir?
    </p>

    <div id="opcoes">
        <button onclick="escolha('esquerda')">Entrar na floresta</button>
        <button onclick="escolha('direita')">Seguir o rio</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
